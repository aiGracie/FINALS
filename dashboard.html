<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Meowtch 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js" defer></script>
</head>
<body>
  
<!-- PAGE 4: OWNER DASHBOARD -->
<div class="page" id="page-owner">
  <div class="dashboard-nav">
    <div>
      <div class="dashboard-title">My Cats 🐾</div>
      <div style="font-size:12px;color:#888;font-weight:600" id="ownerWelcome">Welcome back!</div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="showPage('page-discover')">← Discover</button>
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="showPage('page-discover');setTimeout(showMatchesPanel,50)">✉ Messages</button>
      <button class="dash-logout-btn" onclick="doLogout()">Logout 👋</button>
    </div>
  </div>
  <div class="dashboard-body">
    <div><div class="dash-section-title">Cat Profiles</div><div class="cat-profiles-grid" id="catProfilesGrid"></div></div>
    <div><div class="dash-section-title">Adoption Requests</div><div id="adoptionRequests" style="color:#888;font-size:14px">No pending requests.</div></div>
  </div>
</div>

<!-- PAGE 5: ADOPTER DASHBOARD -->
<div class="page" id="page-adopter">
  <div class="dashboard-nav">
    <div>
      <div class="dashboard-title">My Profile 🏠</div>
      <div style="font-size:12px;color:#888;font-weight:600" id="adopterWelcome">Welcome back!</div>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="showPage('page-discover')">← Discover</button>
      <button class="dash-logout-btn" onclick="doLogout()">Logout 👋</button>
    </div>
  </div>
  <div class="adopter-profile-body">
    <div class="profile-header-card">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar-placeholder" id="adopterAvatarDisplay">🏠</div>
        <div class="profile-edit-avatar" onclick="document.getElementById('adopterAvatarInput').click()">✏</div>
        <input type="file" id="adopterAvatarInput" accept="image/*" style="display:none" onchange="uploadAdopterAvatar(this)">
      </div>
      <div class="profile-details">
        <div class="profile-name" id="adopterName">Your Name</div>
        <div class="profile-email" id="adopterEmail">email@example.com</div>
        <div class="profile-badge">🏠 Adopter</div>
      </div>
    </div>
    <div class="sidebar-card" style="background:white">
      <h3>✏️ Edit Profile</h3>
      <div class="form-group"><label>Bio</label><textarea id="adopterBio" rows="3" placeholder="Tell owners about yourself..."></textarea></div>
      <div class="form-group"><label>Location</label><input type="text" id="adopterLocation" placeholder="City"></div>
      <div class="form-group">
        <label>Living Situation</label>
        <select id="adopterLiving"><option>House with yard</option><option>Apartment</option><option>Condo</option><option>Other</option></select>
      </div>
      <button class="btn btn-primary" style="margin-top:7px" onclick="saveAdopterProfile()">Save Profile 🐾</button>
    </div>
    <div>
      <div class="dash-section-title">Cats I'm Adopting 🐾</div>
      <div class="adopted-cats-grid" id="adoptedCatsGrid">
        <div style="color:#999;font-size:13px;grid-column:1/-1">Start swiping to find your match!</div>
      </div>
    </div>
  </div>
</div>
</body>
